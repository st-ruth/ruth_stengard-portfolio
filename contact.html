    <main>  
        <section class="contact">
            <h1>Lets get in touch</h1>
                <div class="contact-card">
                    <form action="https://postman-echo.com/get" method="get">
                        <div class="field">
                            <label for="first-name">First name</label>
                            <input id="first-name" type="text" placeholder="Your name">
                        </div>
                        <div class="field">
                            <label for="last-name">Last name</label>
                            <input id="last-name" type="text" placeholder="Your lastname">
                        </div>
                        <div class="field">
                            <label for="email">Email</label>
                            <input id="email" type="email" placeholder="your.email@example.com">
                        </div>
                        <div class="field">
                            <label for="phone">Phone number</label>
                            <input id="phone" type="tel" placeholder="555 555 555">
                        </div>
                        <div class="field">
                            <label for="msg">Message</label>
                            <textarea id="msg" rows="10" placeholder="Your message.."></textarea>
                        </div>
                        <button type="submit">Submit</button>
                    </form>
                    
                </div>
        </section>
    </main>
